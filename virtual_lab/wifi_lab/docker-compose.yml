version: '3.8'

# ==============================================================================
# PentexOne IoT Virtual Lab — Multi-Subnet Wi-Fi Network
# ==============================================================================
# Simulates a realistic enterprise/smart-home network with 3 isolated subnets:
#
#   - 172.30.10.0/24  →  IoT subnet       (5 vulnerable IoT devices)
#   - 172.30.20.0/24  →  Guest subnet     (1 device — Smart TV)
#   - 172.30.30.0/24  →  Corporate subnet (1 device — NAS)
#
# Each subnet is a separate Docker bridge network → isolated by default.
# PentexOne can scan each subnet and demonstrate network segmentation awareness.
# ==============================================================================

networks:

  # IoT subnet — vulnerable smart-home devices
  iot_subnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
          gateway: 172.30.10.1
    labels:
      - "lab.network=iot"
      - "lab.subnet_role=IoT_Devices"
      - "lab.difficulty=mixed"

  # Guest subnet — visitor devices with limited trust
  guest_subnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.20.0/24
          gateway: 172.30.20.1
    labels:
      - "lab.network=guest"
      - "lab.subnet_role=Guest_Network"
      - "lab.difficulty=easy"

  # Corporate subnet — internal business infrastructure
  corporate_subnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.30.0/24
          gateway: 172.30.30.1
    labels:
      - "lab.network=corporate"
      - "lab.subnet_role=Corporate_LAN"
      - "lab.difficulty=hard"

services:

  # ============================================================================
  # IoT SUBNET (172.30.10.0/24)
  # ============================================================================

  # ---------------------------------------------------------------------------
  # 1. Hikvision IP Camera
  # ---------------------------------------------------------------------------
  lab-hikvision-camera:
    build: ./hikvision
    container_name: lab-hikvision-camera
    hostname: HIKVISION-CAMERA
    networks:
      iot_subnet:
        ipv4_address: 172.30.10.50
    ports:
      - "8050:80"
    labels:
      - "lab.device=true"
      - "lab.type=ip_camera"
      - "lab.vendor=Hikvision"
      - "lab.subnet=iot"
      - "lab.difficulty=easy"
      - "lab.vulnerabilities=DEFAULT_CREDENTIALS,OUTDATED_FIRMWARE,DIRECTORY_LISTING"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 2. Mosquitto MQTT Broker
  # ---------------------------------------------------------------------------
  lab-mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: lab-mqtt-broker
    hostname: MQTT-BROKER
    networks:
      iot_subnet:
        ipv4_address: 172.30.10.51
    ports:
      - "8051:1883"
      - "8061:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    labels:
      - "lab.device=true"
      - "lab.type=mqtt_broker"
      - "lab.vendor=Eclipse Mosquitto"
      - "lab.subnet=iot"
      - "lab.difficulty=easy"
      - "lab.vulnerabilities=NO_AUTHENTICATION,UNENCRYPTED_PROTOCOL,EXPOSED_TOPICS"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 3. TP-Link Router (acts as IoT gateway)
  # ---------------------------------------------------------------------------
  lab-tplink-router:
    build: ./tplink
    container_name: lab-tplink-router
    hostname: TPLINK-ROUTER
    networks:
      iot_subnet:
        ipv4_address: 172.30.10.52
    ports:
      - "8052:23"
      - "8062:80"
    labels:
      - "lab.device=true"
      - "lab.type=router"
      - "lab.vendor=TP-Link"
      - "lab.subnet=iot"
      - "lab.difficulty=medium"
      - "lab.vulnerabilities=DEFAULT_CREDENTIALS,TELNET_ENABLED,NO_RATE_LIMITING"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 4. Tuya Smart Plug
  # ---------------------------------------------------------------------------
  lab-tuya-plug:
    build: ./tuya
    container_name: lab-tuya-plug
    hostname: TUYA-SMART-PLUG
    networks:
      iot_subnet:
        ipv4_address: 172.30.10.53
    ports:
      - "8053:80"
      - "8063:6668"
    labels:
      - "lab.device=true"
      - "lab.type=smart_plug"
      - "lab.vendor=Tuya"
      - "lab.subnet=iot"
      - "lab.difficulty=medium"
      - "lab.vulnerabilities=UPNP_EXPOSED,NO_LOCAL_AUTH,DEVICE_INFO_DISCLOSURE"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 5. Google Nest Thermostat
  # ---------------------------------------------------------------------------
  lab-nest-thermostat:
    build: ./nest
    container_name: lab-nest-thermostat
    hostname: NEST-THERMOSTAT
    networks:
      iot_subnet:
        ipv4_address: 172.30.10.54
    ports:
      - "8054:80"
      - "8064:8080"
    labels:
      - "lab.device=true"
      - "lab.type=thermostat"
      - "lab.vendor=Google Nest"
      - "lab.subnet=iot"
      - "lab.difficulty=hard"
      - "lab.vulnerabilities=OUTDATED_FIRMWARE,DEBUG_INTERFACE_EXPOSED,WEAK_SESSION_TOKENS"
    restart: unless-stopped

  # ============================================================================
  # GUEST SUBNET (172.30.20.0/24)
  # ============================================================================

  # ---------------------------------------------------------------------------
  # 6. Samsung Smart TV — Guest Network
  # ---------------------------------------------------------------------------
  # Vulnerabilities:
  #   - DIAL protocol exposed (no authentication)
  #   - Cast service open
  #   - Voice command API exposed
  #   - Microphone activation via DIAL
  # ---------------------------------------------------------------------------
  lab-smart-tv:
    build: ./smart_tv
    container_name: lab-smart-tv
    hostname: SAMSUNG-SMARTTV
    networks:
      guest_subnet:
        ipv4_address: 172.30.20.50
    ports:
      - "8070:80"     # Main interface
      - "8071:8001"   # DIAL / Cast service
      - "8072:9197"   # Voice command API
    labels:
      - "lab.device=true"
      - "lab.type=smart_tv"
      - "lab.vendor=Samsung"
      - "lab.subnet=guest"
      - "lab.difficulty=easy"
      - "lab.vulnerabilities=DIAL_EXPOSED,VOICE_API_OPEN,NO_PAIRING_REQUIRED"
    restart: unless-stopped

  # ============================================================================
  # CORPORATE SUBNET (172.30.30.0/24)
  # ============================================================================

  # ---------------------------------------------------------------------------
  # 7. Corporate NAS (Synology-style) — Internal Storage
  # ---------------------------------------------------------------------------
  # Vulnerabilities:
  #   - Default admin credentials (admin/admin123)
  #   - SMB v1 enabled (legacy protocol)
  #   - DSM admin panel exposed
  #   - Anonymous FTP enabled
  #   - Backup of /etc/shadow accessible
  # ---------------------------------------------------------------------------
  lab-corporate-nas:
    build: ./corporate_nas
    container_name: lab-corporate-nas
    hostname: CORP-NAS-01
    networks:
      corporate_subnet:
        ipv4_address: 172.30.30.50
    ports:
      - "8080:80"     # DSM Web Interface
      - "8081:5000"   # DSM HTTPS-style
      - "8082:445"    # SMB
      - "8083:21"     # FTP
    labels:
      - "lab.device=true"
      - "lab.type=nas"
      - "lab.vendor=Synology"
      - "lab.subnet=corporate"
      - "lab.difficulty=hard"
      - "lab.vulnerabilities=DEFAULT_CREDENTIALS,SMBv1_ENABLED,ANONYMOUS_FTP,SHADOW_EXPOSED"
    restart: unless-stopped
