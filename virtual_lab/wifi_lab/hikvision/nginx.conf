worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # VULNERABILITY: Reveals server version
    server_tokens on;

    # VULNERABILITY: Outdated firmware banner
    add_header X-Firmware-Version "V5.4.5 build 170123" always;
    add_header X-Device-Type "Hikvision DS-2CD2042WD-I" always;
    add_header Server "Apache/2.4.41 (Ubuntu)" always;

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # VULNERABILITY: Directory listing enabled
        autoindex on;

        # Main camera interface
        location / {
            try_files $uri $uri/ /index.html;
        }

        # VULNERABILITY: Admin endpoint with default credentials
        location /admin/ {
            auth_basic "Hikvision Camera Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;
            try_files $uri $uri/ /admin/index.html;
        }

        # VULNERABILITY: Exposed device info endpoint (no auth)
        location /ISAPI/System/deviceInfo {
            default_type application/xml;
            return 200 '<?xml version="1.0" encoding="UTF-8"?>
<DeviceInfo>
    <deviceName>HIKVISION-CAMERA</deviceName>
    <deviceID>DS-2CD2042WD-I20170123CCWR123456789</deviceID>
    <model>DS-2CD2042WD-I</model>
    <serialNumber>DS-2CD2042WD-I20170123CCWR123456789</serialNumber>
    <macAddress>00:11:22:33:44:55</macAddress>
    <firmwareVersion>V5.4.5</firmwareVersion>
    <firmwareReleasedDate>2017-01-23</firmwareReleasedDate>
    <bootVersion>V1.3.4</bootVersion>
    <bootReleasedDate>2016-09-15</bootReleasedDate>
    <hardwareVersion>0x0</hardwareVersion>
    <encoderVersion>V7.3</encoderVersion>
    <deviceType>IPCamera</deviceType>
    <telecontrolID>1</telecontrolID>
</DeviceInfo>';
        }

        # VULNERABILITY: RTSP stream endpoint info exposed
        location /Streaming/Channels/101 {
            return 200 'RTSP Stream available at rtsp://172.30.10.50:554/Streaming/Channels/101';
        }

        # Error pages
        error_page 401 /401.html;
        location = /401.html {
            return 401 '{"errorCode":401,"errorMsg":"Authentication Required","deviceID":"HIKVISION-CAMERA"}';
        }
    }
}
