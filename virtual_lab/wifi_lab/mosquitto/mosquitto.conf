# ==============================================================================
# Mosquitto MQTT Broker - INTENTIONALLY VULNERABLE
# ==============================================================================
# VULNERABILITY 1: Anonymous access allowed
# VULNERABILITY 2: No authentication required
# VULNERABILITY 3: Plaintext transport (no TLS)
# VULNERABILITY 4: WebSocket interface exposed
# ==============================================================================

# MQTT default port
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# VULNERABILITY: Allow anonymous connections (no auth required)
allow_anonymous true

# VULNERABILITY: No password file
# password_file /mosquitto/config/passwd

# Persistence (so messages survive restarts — useful for replay attacks)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
log_timestamp true
