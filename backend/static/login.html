<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentex One — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0e1a;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(56, 189, 248, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(139, 92, 246, 0.07) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 50px 44px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f0f4ff;
            margin-bottom: 6px;
        }

        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-bottom: 36px;
            letter-spacing: 0.5px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #f0f4ff;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: rgba(56, 189, 248, 0.5);
            background: rgba(56, 189, 248, 0.04);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }

        .error-msg {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
        }

        .badge {
            margin-top: 28px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🔐</div>
        <h1>Pentex One</h1>
        <p class="subtitle">IoT Security Auditor — Secure Access</p>

        <div class="input-group">
            <label>Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="admin" autocomplete="username">
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
        </div>

        <button class="btn-login" onclick="doLogin()">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </button>

        <div class="error-msg" id="errorMsg">
            <i class="fa-solid fa-circle-xmark"></i> Invalid credentials. Please try again.
        </div>

        <p class="badge">Pentex One v1.0 — Authorized Access Only</p>
    </div>

    <script>
        // Check if already logged in
        if (sessionStorage.getItem('pentex_auth') === 'true') {
            window.location.href = '/dashboard/';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });

            if (res.ok) {
                sessionStorage.setItem('pentex_auth', 'true');
                window.location.href = '/dashboard/';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
